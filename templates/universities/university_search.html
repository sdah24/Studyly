<div class="mt-4">

<nav>

<ul class="pagination justify-content-center">

{% if page_obj.has_previous %}

<li class="page-item">

<a class="page-link"

href="?page={{ page_obj.previous_page_number }}&query={{ request.GET.query }}">

Previous

</a>

</li>

{% endif %}

<li class="page-item disabled">

<span class="page-link">

Page {{ page_obj.number }}

of {{ page_obj.paginator.num_pages }}

</span>

</li>

{% if page_obj.has_next %}

<li class="page-item">

<a class="page-link"

href="?page={{ page_obj.next_page_number }}&query={{ request.GET.query }}">

Next

</a>

</li>

{% endif %}

</ul>

</nav>

</div>
