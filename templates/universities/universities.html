<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form method="GET">

    <input type="text"
           name="search"
           placeholder="Search universities">

    <input type="text"
           name="country"
           placeholder="Country">

    <button type="submit">
        Search
    </button>

</form>
{% for university in universities %}

<div class="uni-card">

    <h3>{{ university.name }}</h3>

    <p>{{ university.country }}</p>

    <p>{{ university.tuition_range }}</p>

    <p>{{ university.intake }}</p>

</div>

{% endfor %}
</body>
</html>
