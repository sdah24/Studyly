<div class="main-content">
  <div class="top-bar">
    <h1>{{ action }} Scholarship</h1>
    <span class="admin-badge">Admin Panel</span>
  </div>
  <div class="content">
    <a href="{% url 'adminpanel:scholarships' %}" class="back-link">← Back to Scholarships</a>

    <div class="form-card">
      <h2>Scholarship Details</h2>
      <form method="post">
        {% csrf_token %}
        <div class="form-grid">
          <div class="field form-full">
            <label>Title *</label>
            <input type="text" name="title" value="{{ schol.title|default:'' }}" required placeholder="e.g. Fulbright Scholarship">
          </div>
          <div class="field">
            <label>Provider</label>
            <input type="text" name="provider" value="{{ schol.provider|default:'' }}" placeholder="e.g. U.S. Department of State">
          </div>
          <div class="field">
            <label>University (optional)</label>
            <select name="university">
              <option value="">— None (Global) —</option>
              {% for uni in universities %}
                <option value="{{ uni.pk }}" {% if schol.university_id == uni.pk %}selected{% endif %}>{{ uni.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="field">
            <label>Funding Type</label>
            <select name="funding_type">
              <option value="full"    {% if schol.funding_type == 'full'    %}selected{% endif %}>Full Funding</option>
              <option value="partial" {% if schol.funding_type == 'partial' %}selected{% endif %}>Partial Funding</option>
            </select>
          </div>
          <div class="field">
            <label>Category</label>
            <select name="category">
              <option value="merit"    {% if schol.category == 'merit'    %}selected{% endif %}>Merit-Based</option>
              <option value="need"     {% if schol.category == 'need'     %}selected{% endif %}>Need-Based</option>
              <option value="sports"   {% if schol.category == 'sports'   %}selected{% endif %}>Sports</option>
              <option value="research" {% if schol.category == 'research' %}selected{% endif %}>Research</option>
            </select>
          </div>
          <div class="field">
            <label>Amount Display</label>
            <input type="text" name="amount_display" value="{{ schol.amount_display|default:'' }}" placeholder="e.g. Full Tuition + Living Expenses">
          </div>
          <div class="field">
            <label>Amount (numeric)</label>
            <input type="number" name="amount" value="{{ schol.amount|default:'' }}" step="0.01" placeholder="e.g. 50000">
          </div>
          <div class="field">
            <label>Deadline *</label>
            <input type="date" name="deadline" value="{{ schol.deadline|date:'Y-m-d'|default:'' }}" required>
          </div>
          <div class="field">
            <label>Target Group</label>
            <input type="text" name="target_group" value="{{ schol.target_group|default:'' }}" placeholder="e.g. Graduate Students">
          </div>
          <div class="field">
            <label>Recipients Per Year</label>
            <input type="text" name="recipients_per_year" value="{{ schol.recipients_per_year|default:'' }}" placeholder="e.g. 4,000">
          </div>
          <div class="field">
            <label>Minimum GPA Required</label>
            <input type="number" name="min_gpa_required" value="{{ schol.min_gpa_required|default:'' }}" step="0.1" min="0" max="4" placeholder="e.g. 3.5">
          </div>
          <div class="field">
            <label>Minimum IELTS Required</label>
            <input type="number" name="min_ielts_required" value="{{ schol.min_ielts_required|default:'' }}" step="0.5" min="0" max="9" placeholder="e.g. 6.5">
          </div>
          <div class="field form-full">
            <label>Description *</label>
            <textarea name="description" required placeholder="Describe the scholarship, eligibility criteria, and benefits…">{{ schol.description|default:'' }}</textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">{{ action }} Scholarship</button>
          <a href="{% url 'adminpanel:scholarships' %}" class="btn-cancel">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
