<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register – Studyly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: white; color: #111827; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; -webkit-font-smoothing: antialiased; }
  :root { --blue: #2563eb; --blue-dark: #1d4ed8; --gray-900: #111827; --gray-600: #4b5563; --gray-400: #9ca3af; --gray-300: #d1d5db; --gray-200: #e5e7eb; }
  a { text-decoration: none; color: inherit; }
  .container { max-width: 420px; width: 100%; }
  .logo-wrap { text-align: center; margin-bottom: 2.5rem; }
  .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .logo-icon { background: #2563eb; padding: 10px; border-radius: 12px; display: flex; }
  .logo-icon svg { width: 24px; height: 24px; color: white; }
  .logo-text { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 900; color: #111827; }
  .logo-wrap h1 { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; margin-bottom: .5rem; }
  .logo-wrap p { color: #4b5563; }
  .card { background: white; border: 1.5px solid #e5e7eb; border-radius: 16px; padding: 2rem; }
  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-weight: 600; font-size: .9rem; color: #111827; margin-bottom: .5rem; }
  .field input { width: 100%; padding: 12px 16px; border: 1.5px solid #d1d5db; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: #111827; outline: none; transition: border .15s, box-shadow .15s; }
  .field input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  .field input::placeholder { color: #9ca3af; }
  .btn-submit { width: 100%; padding: 13px; background: #2563eb; color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background .15s; margin-top: .5rem; }
  .btn-submit:hover { background: #1d4ed8; }
  .footer-text { text-align: center; margin-top: 1.25rem; font-size: .9rem; color: #4b5563; }
  .footer-text a { color: #2563eb; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <a href="index.html" class="logo">
      <div class="logo-icon"><i data-lucide="graduation-cap"></i></div>
      <span class="logo-text">Studyly</span>
    </a>
    <h1>Create Account</h1>
    <p>Join thousands of students studying abroad</p>
  </div>
  <div class="card">
    <form method="POST">

    {% csrf_token %}
      <div class="field">
        <label>Full Name</label>
        <input type="text" placeholder="John Doe" required name="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" required name="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="Create a password" required name="password">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm your password" required name="confirm_password">
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>
    <p class="footer-text">Already have an account? <a href="{% url 'login' %}">Login</a></p>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
