<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Studyly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--white); color: #111827; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; -webkit-font-smoothing: antialiased; }
  :root { --blue: #2563eb; --blue-dark: #1d4ed8; --gray-900: #111827; --gray-600: #4b5563; --gray-400: #9ca3af; --gray-300: #d1d5db; --gray-200: #e5e7eb; --white: #ffffff; }
  a { text-decoration: none; color: inherit; }
  .container { max-width: 420px; width: 100%; }
  .logo-wrap { text-align: center; margin-bottom: 2.5rem; }
  .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .logo-icon { background: var(--blue); padding: 10px; border-radius: 12px; display: flex; }
  .logo-icon svg { width: 24px; height: 24px; color: white; }
  .logo-text { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 900; color: var(--gray-900); }
  .logo-wrap h1 { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; color: var(--gray-900); margin-bottom: .5rem; }
  .logo-wrap p { color: var(--gray-600); }
  .card { background: white; border: 1.5px solid var(--gray-200); border-radius: 16px; padding: 2rem; }
  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-weight: 600; font-size: .9rem; color: var(--gray-900); margin-bottom: .5rem; }
  .field input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-300); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--gray-900); outline: none; transition: border .15s, box-shadow .15s; }
  .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  .field input::placeholder { color: var(--gray-400); }
  .btn-submit { width: 100%; padding: 13px; background: var(--blue); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background .15s; margin-top: .5rem; }
  .btn-submit:hover { background: var(--blue-dark); }
  .footer-text { text-align: center; margin-top: 1.25rem; font-size: .9rem; color: var(--gray-600); }
  .footer-text a { color: var(--blue); font-weight: 600; }
  .footer-text a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <a href="index.html" class="logo">
      <div class="logo-icon"><i data-lucide="graduation-cap"></i></div>
      <span class="logo-text">Studyly</span>
    </a>
    <h1>Welcome Back</h1>
    <p>Sign in to your account</p>
  </div>
  <div class="card">
    <form onsubmit="event.preventDefault(); window.location.href='dashboard.html'">
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-submit">Login</button>
    </form>
    <p class="footer-text">Don't have an account? <a href="register.html">Sign up</a></p>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
