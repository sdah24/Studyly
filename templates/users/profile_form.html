{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Create Profile</h2>

    <form method="post">

        {% csrf_token %}

        <div class="mb-3">
            <label>Full Name</label>
            {{ form.full_name }}
        </div>

        <div class="mb-3">
            <label>Phone Number</label>
            {{ form.phone_number }}
        </div>

        <div class="mb-3">
            <label>Date of Birth</label>
            {{ form.date_of_birth }}
        </div>

        <div class="mb-3">
            <label>Address</label>
            {{ form.address }}
        </div>

        <button class="btn btn-primary">
            Save Profile
        </button>

    </form>

</div>

{% endblock %}
