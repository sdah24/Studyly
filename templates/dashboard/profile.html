<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    {% if error %}
<p style="color:red; text-align:center;">
    {{error}}
</p>
    {% endif %}
<h2>User Profile</h2>

<form method="POST">
    {% csrf_token %}

    <label>GPA</label>
    <input
     type="number"
    step="0.01"
    name="GPA"
    required>

       <br><br>

    <label>Budget</label>
    <input type="number"
           name="budget"
           required>

    <br><br>

    <label>Preferred Countries</label>
    <input type="text"
           name="preferred_countries"
           placeholder="USA, UK, Canada"
           required>

    <br><br>

    <button type="submit">
        Save Profile
    </button>

</form>


</body>
</html>
