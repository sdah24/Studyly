{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Delete Scholarship</h2>

<p>

Are you sure you want to delete:

<strong>

{{ scholarship.title }}

</strong>?

</p>

<form method="post">

{% csrf_token %}

<button
    type="submit"
    class="btn btn-danger"
>

Yes, Delete

</button>

<a
    href="{% url 'scholarships:list' %}"
    class="btn btn-secondary"
>

Cancel

</a>

</form>

</div>

{% endblock %}
